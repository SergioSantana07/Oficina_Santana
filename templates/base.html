{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Peças e Mecânica Santana</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-santana fixed-top">
    <div class="container">

        <a class="navbar-brand" href="/">
            <img src="{% static 'img/logo.png' %}"
                 alt="Logo Santana"
                 height="70">
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/sobre/">Sobre</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/produtos/">Produtos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/servicos/">Serviços</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contato/">Contato</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer class="footer-santana text-center">

    <div class="container">

        <h5>Auto Peças e Mecânica Santana</h5>

        <p>
            Qualidade, confiança e excelência em serviços automotivos.
        </p>

        <p>
            © 2026 Todos os direitos reservados.
        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
